<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#090c0a">
<title>xG Live</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── GLOBAL ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090c0a;--bg2:#111513;--bg3:#181c17;--bg4:#1e241d;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.12);--green-bg:rgba(74,222,128,0.08);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.11);
  --red:#f87171;--blue:#60a5fa;
  --text:#e2e8e0;--text2:#8a9488;--text3:#4a5248;
  --r:10px;--mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.hidden{display:none!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  padding-top:max(14px,env(safe-area-inset-top));
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.hdr-title{font-family:var(--sans);font-size:19px;font-weight:800;color:var(--green);letter-spacing:-.03em;flex:1}
.quota-pill{
  display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);font-size:11px;font-family:var(--mono);cursor:default;
}
.qdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.qdot.ok{background:var(--green);box-shadow:0 0 5px rgba(74,222,128,.5)}
.qdot.warn{background:var(--amber)}.qdot.bad{background:var(--red)}
.qval{font-weight:600;transition:color .3s}
.qval.ok{color:var(--green)}.qval.warn{color:var(--amber)}.qval.bad{color:var(--red)}.qval.dim{color:var(--text2)}
.qlbl{color:var(--text3);font-size:10px}

/* ── NAV TABS ── */
.nav-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-tab{
  flex:1;padding:11px 0;font-size:13px;font-weight:700;font-family:var(--sans);
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text3);cursor:pointer;transition:color .15s,border-color .15s;letter-spacing:-.01em;
  outline:none;-webkit-tap-highlight-color:transparent;
}
.nav-tab:focus{outline:none}
.nav-tab.active{color:var(--text);border-bottom-color:var(--green)}

/* ── SUBHEADER ── */
.subhdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.live-badge{
  display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--red);
}
.lv-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
.sub-meta{font-size:11px;color:var(--text3)}
.rbtn{
  display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;
}
.rbtn:active{background:var(--bg4)}
.rbtn.loading{opacity:.5;pointer-events:none}
.spin{display:inline-block;animation:spin .6s linear infinite}

/* ── VIEWS ── */
.view{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── GROUPED MATCH LIST ── */
.mlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mlist::-webkit-scrollbar{display:none}

/* League section header */
.league-hdr{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px 6px;
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);
}
.league-hdr-flag{font-size:14px;line-height:1}
.league-hdr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.league-section{border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:2px}

/* Match row */
.mrow{
  display:flex;align-items:center;gap:0;
  padding:11px 16px;cursor:pointer;
  transition:background .1s;
  -webkit-user-select:none;user-select:none;
  border-top:1px solid var(--border);
}
.mrow:first-child{border-top:none}
.mrow:active{background:var(--bg3)}

/* Time / minute column */
.mrow-time{
  min-width:48px;font-family:var(--mono);font-size:13px;font-weight:600;
  color:var(--text3);flex-shrink:0;
}
.mrow-time.live{color:var(--green)}
.mrow-time.ht{color:var(--amber);font-size:11px}

/* Teams + score column */
.mrow-body{flex:1;min-width:0;padding:0 10px 0 8px}
.mrow-teams{display:flex;flex-direction:column;gap:3px}
.mrow-team{
  display:flex;align-items:center;gap:6px;
  font-size:14px;font-weight:500;color:var(--text);
}
.mrow-team-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow-score{
  font-family:var(--mono);font-size:14px;font-weight:700;
  min-width:16px;text-align:right;color:var(--text);flex-shrink:0;
}
.mrow-score.winner{color:var(--green)}
.rc-card{width:7px;height:10px;border-radius:1px;background:var(--red);display:inline-block;margin-left:3px;flex-shrink:0}

/* xG bars under each team name */
.mrow-xg{
  display:flex;align-items:center;gap:6px;margin-top:5px;
}
.xg-bar-wrap{flex:1;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.xg-bar-h{height:100%;background:var(--green);border-radius:1px}
.xg-bar-a{height:100%;background:var(--amber);border-radius:1px}
.xgv{font-size:9px;font-family:var(--mono);font-weight:600;color:var(--text3);white-space:nowrap}
.xgv.h{color:var(--green)}.xgv.a{color:var(--amber)}

/* Tips badge column */
.mrow-badge{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.badge-notips{
  font-size:10px;font-weight:600;color:var(--text3);
  border:1px dashed var(--border2);border-radius:20px;padding:3px 9px;white-space:nowrap;
}
.badge-value{
  font-size:10px;font-weight:800;color:var(--green);letter-spacing:.04em;
  background:var(--green-dim);border:1px solid rgba(74,222,128,.3);border-radius:20px;padding:3px 9px;white-space:nowrap;
}
.badge-tips{
  font-size:10px;font-weight:600;color:var(--blue);
  background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);border-radius:20px;padding:3px 9px;white-space:nowrap;
}
.badge-mxg{
  font-size:9px;font-weight:700;color:var(--blue);
  background:rgba(96,165,250,.08);border-radius:4px;padding:2px 5px;
}

/* Team initials circle */
.team-circle{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;font-family:var(--sans);
  color:#fff;text-transform:uppercase;letter-spacing:-.02em;
}
.team-circle-logo{background:var(--bg3);padding:2px;}
.team-circle-logo img{width:100%;height:100%;border-radius:50%;object-fit:contain;}

/* Scheduled game (today tab) */
.mrow.scheduled .mrow-team-name{color:var(--text2)}
.mrow.scheduled .mrow-score{color:var(--text3)}
.mrow.scheduled .team-circle{opacity:.7}

/* Loading / empty */
.loading-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--text3);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.mempty{padding:40px 16px;text-align:center;color:var(--text3);font-size:14px;line-height:1.7}
.err-box{margin:16px;padding:14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);border-radius:8px;color:var(--red);font-size:13px;line-height:1.6}

/* ── DETAIL VIEW ── */
.det-hdr{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.back-btn{
  display:flex;align-items:center;gap:3px;padding:7px 12px;border-radius:8px;
  background:transparent;border:1px solid var(--border);color:var(--text2);
  font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;
}
.back-btn:active{background:var(--bg4)}
.det-meta{flex:1;min-width:0}
.det-tourn{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.det-live-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--red);font-weight:600;margin-left:6px}
.det-scroll{flex:1;overflow-y:auto;padding:12px 12px 32px}
.det-scroll::-webkit-scrollbar{display:none}

/* ── SCORE BLOCK ── */
.score-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;margin-bottom:10px}
.score-row{display:flex;align-items:center;gap:8px}
.score-team{flex:1;min-width:0}
.s-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-name.a{text-align:right}
.s-sub{font-size:11px;color:var(--text2);margin-top:1px}
.s-sub.a{text-align:right}
.score-num{font-family:var(--mono);font-size:30px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 14px;white-space:nowrap;flex-shrink:0}
.score-time{text-align:center;font-size:11px;color:var(--green);font-weight:600;font-family:var(--mono);margin-top:8px}
.xg-edit-btn{
  display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text3);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;
}
.xg-edit-btn:active{background:var(--bg4)}
.xg-edit-btn.has-manual{border-color:rgba(74,222,128,.4);color:var(--green);background:var(--green-bg)}
.manual-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:rgba(96,165,250,.12);color:var(--blue);letter-spacing:.04em}

/* ── CHART BLOCK ── */
.chart-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 12px 10px;margin-bottom:10px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.chart-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.chart-legend{display:flex;gap:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.chart-wrap{position:relative;width:100%;height:190px}
.chart-empty{height:140px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.st-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px}
.st-vals{display:flex;align-items:baseline;justify-content:space-between}
.stv-h{font-size:19px;font-weight:700;font-family:var(--mono);color:var(--green)}
.stv-a{font-size:19px;font-weight:700;font-family:var(--mono);color:var(--amber)}

/* ── SHOTS LIST ── */
.shots-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.shots-hdr{padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:flex;justify-content:space-between}
.shot-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:12px}
.shot-row:last-child{border-bottom:none}
.sh-min{color:var(--text3);font-family:var(--mono);font-size:10px;min-width:28px;flex-shrink:0}
.sh-goal{font-size:13px;width:16px;flex-shrink:0;text-align:center}
.sh-player{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.sh-side{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.sh-side.h{background:var(--green-dim);color:var(--green)}
.sh-side.a{background:var(--amber-dim);color:var(--amber)}
.sh-xg{color:var(--amber);font-family:var(--mono);font-size:11px;font-weight:600;flex-shrink:0;min-width:38px;text-align:right}

/* ── ANALYSIS CARD ── */
.analysis-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ac-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.ac-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.analysis-card:has(.ac-pick) .ac-title{color:var(--green)}
.ac-min{font-size:11px;color:var(--green);font-family:var(--mono);font-weight:600}
.ac-warn{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border)}
.ac-wi{font-size:13px;flex-shrink:0;margin-top:1px}
.ac-wt{font-size:12px;color:var(--text2);line-height:1.45}
.ac-pick{padding:10px 14px;border-bottom:1px solid var(--border)}
.ac-pick:last-child{border-bottom:none}
.ac-pick-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.ac-pick-mkt{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--green-dim);color:var(--green);flex-shrink:0}
.ac-pick-lbl{font-size:14px;font-weight:700;color:var(--text);flex:1}
.ac-pick-odds{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--green)}
.ac-pick-sub{font-size:11px;color:var(--text3);line-height:1.4}
.ac-nopick{padding:12px 14px;font-size:12px;color:var(--text3)}

/* ── ODDS BLOCK ── */
.odds-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.odds-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.odds-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.odds-bookie{font-size:11px;color:var(--text2);font-family:var(--mono)}
.odds-stale{font-size:10px;color:var(--text3);margin-left:4px}
.odds-1x2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.odds-cell{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center}
.odds-cell.value{border-color:rgba(74,222,128,.4);background:var(--green-bg)}
.odds-cell-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.odds-cell-val{font-size:19px;font-weight:700;font-family:var(--mono);color:var(--text)}
.odds-cell-prob{font-size:10px;color:var(--text2);margin-top:2px}
.odds-cell.value .odds-cell-val{color:var(--green)}
.odds-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border)}
.odds-row-lbl{font-size:11px;color:var(--text3)}
.odds-chips{display:flex;gap:8px;align-items:center}
.ochip{font-size:12px;font-family:var(--mono);font-weight:600;padding:3px 9px;border-radius:4px;background:var(--bg3);border:1px solid var(--border)}
.ochip.value{background:var(--green-bg);border-color:rgba(74,222,128,.3);color:var(--green)}

/* ── MODEL PROBS ── */
.model-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.model-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.model-row:last-child{margin-bottom:0}
.model-lbl{font-size:12px;color:var(--text2);min-width:54px;flex-shrink:0}
.model-bar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.model-fill{height:100%;border-radius:3px;transition:width .6s}
.model-pct{font-size:12px;font-family:var(--mono);font-weight:600;min-width:38px;text-align:right;flex-shrink:0}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.proj-cell{background:var(--bg3);border-radius:6px;padding:7px 10px}
.proj-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.proj-vals{display:flex;justify-content:space-between;align-items:baseline}
.proj-h{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--green)}
.proj-a{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--amber)}

/* ── BENTER ── */
.benter-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.benter-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.benter-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.benter-weights{display:flex;gap:5px;align-items:center}
.bw{padding:2px 7px;border-radius:4px;font-weight:700;font-size:10px;font-family:var(--mono)}
.bw.m{background:var(--green-dim);color:var(--green)}.bw.b{background:rgba(96,165,250,.1);color:var(--blue)}
.benter-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border)}
.b-out{font-size:12px;font-weight:600;color:var(--text);min-width:60px;flex-shrink:0}
.b-info{flex:1}
.b-blend{font-size:13px;font-family:var(--mono);font-weight:700;color:var(--text)}
.b-sub{font-size:10px;color:var(--text3);margin-top:1px}
.b-edge{font-size:13px;font-family:var(--mono);font-weight:700;min-width:52px;text-align:right;flex-shrink:0}
.b-edge.pos{color:var(--green)}.b-edge.neg{color:var(--red)}.b-edge.neu{color:var(--text3)}
.val-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.3);flex-shrink:0;white-space:nowrap}
.no-odds{padding:12px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text3);line-height:1.6}

/* ── GOALS LIST ── */
.goals-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.goal-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.goal-row:last-child{border-bottom:none}
.goal-min{font-family:var(--mono);font-size:11px;font-weight:600;min-width:30px;flex-shrink:0}
.goal-min.h{color:var(--green)}.goal-min.a{color:var(--amber)}
.goal-player{flex:1;color:var(--text);font-weight:500}
.goal-side{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.goal-side.h{background:var(--green-dim);color:var(--green)}
.goal-side.a{background:var(--amber-dim);color:var(--amber)}

/* ── TIPS HISTORY ── */
.tips-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.tips-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border)}
.tips-hdr-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.tips-hdr-count{font-size:10px;font-family:var(--mono);color:var(--text3)}

<script>
// ─────────────────────── CONFIG ───────────────────────
// Railway URL — read dynamically so changes take effect immediately
function BASE() {
  const v = (localStorage.getItem('_sf_host') || '').trim().replace(/\/+$/, '');
  if (!v) return '';  // unconfigured
  if (v.startsWith('http://') || v.startsWith('https://')) return v;
  const local = v.startsWith('localhost') || v.startsWith('127.') || /^192\.168\.|^10\./.test(v);
  return (local ? 'http://' : 'https://') + v;
}
function isConfigured() { return !!localStorage.getItem('_sf_host'); }
const autoMs = () => parseInt(localStorage.getItem('_auto_ms') || '60000');

const S = {
  matches: [],
  xgCache: {},        // id → {homeXg, awayXg}
  trackCache: {},     // id → {data, ts}  (client-side TTL = 90s)
  TRACK_TTL: 90000,
  selectedId: null,
  autoTimer: null,
  detTimer: null,
  chart: null,
};

// ─────────────────────── COUNTRY FLAGS ───────────────────────
const COUNTRY_FLAGS = {
  'england':'🏴󠁧󠁢󠁥󠁮󠁧󁿢','scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','wales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','northern ireland':'🇬🇧',
  'spain':'🇪🇸','italy':'🇮🇹','germany':'🇩🇪','france':'🇫🇷','portugal':'🇵🇹',
  'netherlands':'🇳🇱','belgium':'🇧🇪','turkey':'🇹🇷','sweden':'🇸🇪','norway':'🇳🇴',
  'denmark':'🇩🇰','poland':'🇵🇱','czech republic':'🇨🇿','greece':'🇬🇷','switzerland':'🇨🇭',
  'austria':'🇦🇹','croatia':'🇭🇷','serbia':'🇷🇸','romania':'🇷🇴','hungary':'🇭🇺',
  'slovakia':'🇸🇰','slovenia':'🇸🇮','ukraine':'🇺🇦','russia':'🇷🇺','finland':'🇫🇮',
  'iceland':'🇮🇸','ireland':'🇮🇪','israel':'🇮🇱',
  'usa':'🇺🇸','united states':'🇺🇸','mexico':'🇲🇽','canada':'🇨🇦',
  'brazil':'🇧🇷','argentina':'🇦🇷','colombia':'🇨🇴','chile':'🇨🇱','uruguay':'🇺🇾',
  'ecuador':'🇪🇨','peru':'🇵🇪','venezuela':'🇻🇪','paraguay':'🇵🇾','bolivia':'🇧🇴',
  'australia':'🇦🇺','japan':'🇯🇵','south korea':'🇰🇷','china':'🇨🇳','india':'🇮🇳',
  'saudi arabia':'🇸🇦','qatar':'🇶🇦','uae':'🇦🇪','iran':'🇮🇷',
  'egypt':'🇪🇬','morocco':'🇲🇦','nigeria':'🇳🇬','south africa':'🇿🇦','ghana':'🇬🇭',
  'international':'🌍','europe':'🇪🇺','africa':'🌍','asia':'🌏',
  'south america':'🌎','north & central america':'🌎','oceania':'🌏',
  'conmebol':'🌎','uefa':'🇪🇺',
};
function countryFlag(c) {
  if (!c) return '';
  return COUNTRY_FLAGS[c.toLowerCase()] || '';
}

// Format minute for display — handles stoppage time (45+8', 90+3')
function fmtMin(m) {
  if (!m || !m.minute) return '';
  if (m.injuryTime > 0) return m.minute + '+' + m.injuryTime + "'";
  return m.minute + "'";
}

// ─────────────────────── xG MANUAL STORE ───────────────────────
function getManualXg(id) {
  try { return JSON.parse(localStorage.getItem('_mxg_' + id) || 'null'); } catch { return null; }
}
function setManualXg(id, d) {
  localStorage.setItem('_mxg_' + id, JSON.stringify(d));
}
function clearManualXg(id) {
  localStorage.removeItem('_mxg_' + id);
}
function buildManualShots(manual) {
  // Build a synthetic shots object from manual xG values
  const hs = manual.shotsHome || 0, as_ = manual.shotsAway || 0;
  const hxg = manual.homeXg || 0, axg = manual.awayXg || 0;
  const mkShots = (n, xg, isHome) => {
    if (n === 0 && xg > 0) return [{ xg: parseFloat(xg), minute: 1, addedTime: 0, player: '—', situation: 'manual', bodyPart: '—', isGoal: false, isHome }];
    if (n === 0) return [];
    const perShot = parseFloat(xg) / n;
    return Array.from({ length: n }, (_, i) => ({
      xg: parseFloat((perShot).toFixed(4)), minute: Math.round((i + 1) * 90 / n), addedTime: 0,
      player: '—', situation: 'manual', bodyPart: '—', isGoal: false, isHome,
    }));
  };
  const homeShots = mkShots(hs, hxg, true);
  const awayShots = mkShots(as_, axg, false);
  return {
    homeShots, awayShots,
    homeXg: parseFloat(hxg), awayXg: parseFloat(axg),
    totalShots: homeShots.length + awayShots.length,
    _manual: true,
  };
}

// ─────────────────────── FETCH ───────────────────────
async function api(path) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch(BASE() + path, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) return { ok: false, status: r.status, data: null };
    return { ok: true, data: await r.json() };
  } catch(e) {
    clearTimeout(tid);
    return { ok: false, data: null, err: e.message };
  }
}

async function trackApi(id) {
  return api(`/api/track/${id}`);
}

// ─────────────────────── QUOTA ───────────────────────
async function refreshQuota() {
  const { ok, data } = await api('/api/odds/quota');
  if (ok && data) setQuota(data.remaining);
}

// ─────────────────────── MATCH LIST ───────────────────────
async function loadMatches() {
  const el = document.getElementById('mlist');

  // Show setup screen if Railway URL not configured
  if (!isConfigured()) {
    el.innerHTML = renderSetupPrompt();
    document.getElementById('btn-refresh').classList.remove('loading');
    document.getElementById('btn-refresh').innerHTML = '↻ Refresh';
    return;
  }

  // Show loading state immediately — clears setup form before the network call
  const el2 = document.getElementById('mlist');
  el2.innerHTML = '<div class="loading-row"><div class="spinner"></div>A ligar ao servidor…</div>';

  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading'); btn.innerHTML = '<span class="spin">↻</span>';
  const { ok, data } = await api('/api/state');
  btn.classList.remove('loading'); btn.innerHTML = '↻ Refresh';

  if (!ok || !data) {
    el.innerHTML = `<div class="err-box" style="margin:16px">
      <strong>Servidor inacessível</strong><br>
      <span style="font-size:12px;font-family:var(--mono);word-break:break-all">${BASE()}</span><br><br>
      Verifica o URL do Railway ou aguarda o arranque do servidor (pode demorar ~30s).
      <br><br>
      <button onclick="openSetup()" style="margin-top:4px;padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:13px;cursor:pointer">
        ✎ Alterar URL do servidor
      </button>
    </div>`;
    return;
  }

  // /api/state returns pre-computed analysis for all monitored live games
  const games = data.games || [];
  S.matches = games.map(g => g.match).filter(Boolean);
  document.getElementById('live-count').textContent = S.matches.filter(m => m.isLive).length;

  // Populate caches from pre-computed server data — zero extra API calls
  for (const g of games) {
    const mid = g.match?.id;
    if (!mid) continue;
    S.trackCache[mid] = { data: g, ts: Date.now() };
    if (g.shots && (g.shots.homeXg > 0 || g.shots.awayXg > 0)) {
      S.xgCache[mid] = { homeXg: g.shots.homeXg, awayXg: g.shots.awayXg };
      updateCardBar(mid, g.shots.homeXg, g.shots.awayXg);
    }
    // Merge server-side tips into localStorage for the tip history UI
    if (g.tips && g.tips.length) mergeServerTips(mid, g.tips);
  }

  if (data.quotaRemaining != null) setQuota(data.quotaRemaining);
  if (data.cycleTsIso) {
    const ago = Math.round((Date.now() - new Date(data.cycleTsIso).getTime()) / 1000);
    document.getElementById('sub-meta').textContent = `Ciclo há ${ago < 5 ? '<5' : ago}s`;
  }

  renderList();
}

// Merge server-side tips into localStorage format for the tip history UI
function mergeServerTips(matchId, serverTips) {
  const existing = getTips(matchId);
  let changed = false;
  for (const st of serverTips) {
    const found = existing.find(t => t.key === st.tip_key);
    if (!found) {
      existing.push({
        key: st.tip_key, market: st.market, label: st.label,
        oddEntry: st.odd_entry, oddNow: st.odd_now,
        edgeEntry: st.edge_entry ?? null,
        minuteEntry: st.minute_entry, ts: (st.wall_ts || 0) * 1000,
        result: st.result,
      });
      changed = true;
    } else {
      if (found.result === null && st.result !== null) { found.result = st.result; changed = true; }
      if (found.oddNow !== st.odd_now) { found.oddNow = st.odd_now; changed = true; }
    }
  }
  if (changed) saveTips(matchId, existing);
}

// ─────────────────────── XG PREFETCH ───────────────────────
// Silently fetch xG for matches not yet in cache — updates bars as data arrives
async function prefetchXg(matches) {
  const uncached = matches.filter(m => !S.xgCache[m.id] && m.isLive);
  for (const m of uncached) {
    // Check manual override first — no server call needed
    const manual = getManualXg(m.id);
    if (manual && (manual.homeXg > 0 || manual.awayXg > 0)) {
      S.xgCache[m.id] = { homeXg: manual.homeXg, awayXg: manual.awayXg };
      updateCardBar(m.id, manual.homeXg, manual.awayXg);
      continue;
    }

    if (S.selectedId) return;  // stop if user opened a match
    const { ok, data } = await api(`/api/shots/${m.id}`);
    if (ok && data && data.totalShots > 0) {
      S.xgCache[m.id] = { homeXg: data.homeXg, awayXg: data.awayXg };
      updateCardBar(m.id, data.homeXg, data.awayXg);
    }
    await new Promise(r => setTimeout(r, 300));  // 300ms between Sofascore calls
  }
}

// Update just the xG bar of a card already in the DOM, no full re-render
function updateCardBar(id, hxg, axg) {
  const card = document.querySelector(`.mcard[data-id="${id}"]`);

// ─────────────────────── TEAM LOGOS ───────────────────────
let _LOGOS = {};      // name → url  (from server)
let _LOGOS_NORM = {}; // normalised key → url

function _normTeam(n) {
  return n.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // strip accents
    .replace(/\b(fc|afc|sc|bk|fk|sk|cf|if|ac|as|ss|rcd|rc|sd|ud|cd|real|athletic|club|calcio|united|city|town|rovers|wanderers|hotspur|county|albion)\b/g, '')
    .replace(/[^a-z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

function _buildLogoIndex(teams) {
  _LOGOS = teams;
  _LOGOS_NORM = {};
  for (const [name, url] of Object.entries(teams)) {
    _LOGOS_NORM[_normTeam(name)] = url;
  }
}

function _findLogo(name) {
  if (!name) return null;
  // 1. exact
  if (_LOGOS[name]) return _LOGOS[name];
  // 2. normalised exact
  const nk = _normTeam(name);
  if (_LOGOS_NORM[nk]) return _LOGOS_NORM[nk];
  // 3. word-overlap: find candidate whose normalised key shares all significant words with query
  const words = nk.split(' ').filter(w => w.length > 2);
  if (!words.length) return null;
  let best = null, bestScore = 0;
  for (const [k, url] of Object.entries(_LOGOS_NORM)) {
    const kWords = k.split(' ');
    const hits = words.filter(w => kWords.includes(w)).length;
    const score = hits / Math.max(words.length, kWords.length);
    if (score > bestScore && score >= 0.6) { bestScore = score; best = url; }
  }
  return best;
}

async function loadLogos() {
  const LS_KEY = '_team_logos_v1';
  const LS_TS  = '_team_logos_ts';
  const TTL    = 86400 * 1000; // 24 h
  try {
    const ts = parseInt(localStorage.getItem(LS_TS) || '0');
    if (Date.now() - ts < TTL) {
      const cached = localStorage.getItem(LS_KEY);
      if (cached) { _buildLogoIndex(JSON.parse(cached)); return; }
    }
  } catch(e) {}
  const { ok, data } = await api('/api/team_logos');
  if (ok && data?.teams) {
    _buildLogoIndex(data.teams);
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(data.teams));
      localStorage.setItem(LS_TS, String(Date.now()));
    } catch(e) {}
  }
}

// ─────────────────────── TEAM CIRCLE ───────────────────────
const _CIRCLE_PALETTE = [
  '#e74c3c','#e67e22','#f39c12','#27ae60','#16a085',
  '#2980b9','#8e44ad','#c0392b','#d35400','#1a8a5a',
  '#1abc9c','#3498db','#9b59b6','#2c3e50','#7f8c8d',
];
function teamInitials(name) {
  const words = name.replace(/[^a-zA-Z0-9 ]/g,'').trim().split(/\s+/);
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}
function teamColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return _CIRCLE_PALETTE[Math.abs(h) % _CIRCLE_PALETTE.length];
}
function teamCircle(name) {
  const logo = _findLogo(name);
  if (logo) return `<div class="team-circle team-circle-logo"><img src="${logo}" alt="${name}" loading="lazy" onerror="this.parentElement.outerHTML=\`<div class='team-circle' style='background:${teamColor(name)}'>${teamInitials(name)}</div>\`"></div>`;
  const bg = teamColor(name);
  const ini = teamInitials(name);
  return `<div class="team-circle" style="background:${bg}">${ini}</div>`;
}

function renderGrouped(matches, isLive) {
  // Group by tournament
  const groups = {};
  for (const m of matches) {
    const key = m.tournament || 'Outro';
    if (!groups[key]) groups[key] = { matches: [], country: m.country, tournament: m.tournament };
    groups[key].matches.push(m);
  }

  return Object.values(groups).map(g => {
    const flag = countryFlag(g.country);
    const rows = g.matches.map(m => renderMatchRow(m, isLive)).join('');
    return `<div class="league-section">
      <div class="league-hdr">
        ${flag ? `<span class="league-hdr-flag">${flag}</span>` : ''}
        <span class="league-hdr-name">${g.tournament}${g.country ? ' · ' + g.country : ''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

  const tc = S.trackCache[m.id]?.data;
  const tips = getTips(m.id);

  // Time / minute
  let timeStr, timeCls = '';
  if (isLive && m.minute) {
    if (m.statusCode === 31 || m.statusDesc?.toLowerCase() === 'halftime') {
      timeStr = 'HT'; timeCls = 'ht';
    } else {
      timeStr = fmtMin(m); timeCls = 'live';
    }
  } else if (m.startTimestamp) {
    const d = new Date(m.startTimestamp * 1000);
    timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  } else {
    timeStr = m.statusDesc || '—';
  }

  // Red cards
  const cards = tc?.incidents?.cards || [];
  const rcTypes = new Set(['red','yellowRed']);
  const rcHome = cards.filter(c => rcTypes.has(c.cardType) && c.isHome).length;
  const rcAway = cards.filter(c => rcTypes.has(c.cardType) && !c.isHome).length;
  const rcHtml = (n) => n > 0 ? Array(n).fill('<span class="rc-card"></span>').join('') : '';

  const cached = S.xgCache[m.id];
  const hxg = cached?.homeXg; const axg = cached?.awayXg;

  const hPct = hasXg ? Math.round(hxg / (hxg + axg) * 100) : 0;
  const aPct = hasXg ? 100 - hPct : 0;
  const xgHtml = isLive && hasXg ? `<div class="mrow-xg">

  const hasValue = tc?.odds?.benter?.h2h?.outcomes &&

  if (getManualXg(m.id)) badgeHtml = `<span class="badge-mxg">✏ xG</span>` + badgeHtml;

  return `<div class="mrow${isLive ? '' : ' scheduled'}" data-id="${m.id}">
    <div class="mrow-time ${timeCls}">${timeStr}</div>
    <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;margin:0 10px 0 2px">

          <span class="mrow-team-name">${m.awayTeam}</span>

    ${isLive ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin-right:10px;min-width:18px">
      <span class="mrow-score${m.homeGoals > m.awayGoals ? ' winner' : ''}">${m.homeGoals}</span>

async function openMatch(id) {
  S.selectedId = id;
  // Remember which tab we came from so back button returns there
  S.prevTab = document.getElementById('view-today').classList.contains('hidden') ? 'live' : 'today';
  showView('detail');

  const m = S.matches.find(x => x.id === id);
  if (m) {
    const flag = countryFlag(m.country);
    document.getElementById('det-meta').innerHTML =
      `<div class="det-tourn">${flag ? flag + ' ' : ''}${m.tournament}` +
      (m.isLive ? `<span class="det-live-chip"><span style="width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 1.2s infinite"></span>${m.minute ? fmtMin(m) : 'LIVE'}</span>` : '') +
      `</div>`;
  }

  document.getElementById('det-scroll').innerHTML =
    `<div class="loading-row"><div class="spinner"></div>A recolher xG…</div>`;

  await fetchDetail(id);

  if (S.detTimer) clearInterval(S.detTimer);
  S.detTimer = setInterval(() => { if (S.selectedId === id) fetchDetail(id); }, 30000);
}

async function fetchDetail(id, forceRefresh = false) {
  const refBtn = document.getElementById('btn-det-refresh');
  if (refBtn) { refBtn.innerHTML = '<span class="spin">↻</span>'; refBtn.disabled = true; }

  // Client-side cache: skip server call if fresh enough and not forced
  const now = Date.now();
  const cached = S.trackCache[id];
  if (!forceRefresh && cached && (now - cached.ts) < S.TRACK_TTL) {
    if (refBtn) { refBtn.innerHTML = '↻'; refBtn.disabled = false; }
    renderDetail(cached.data);
    return;
  }

  const { ok, data } = await trackApi(id);

  if (refBtn) { refBtn.innerHTML = '↻'; refBtn.disabled = false; }

  if (!ok || !data || data.error) {
    document.getElementById('det-scroll').innerHTML =
      `<div class="err-box">Erro ao carregar dados do jogo.</div>`;
    return;
  }

  // Apply manual xG override whenever one exists for this match
  // (covers games with no Sofascore data AND games where user wants to override)
  const manual = getManualXg(id);
  if (manual) {
    data.shots = buildManualShots(manual);
    data._manualXg = true;
    // Recalculate model odds client-side (server used shots.homeXg=0 before injection)
    if (data.odds) data.odds = injectManualOdds(data.odds, data.match, data.shots);
  }

  // Update caches AFTER possible manual injection so bar shows correct values
  S.xgCache[id] = { homeXg: data.shots.homeXg, awayXg: data.shots.awayXg };
  S.trackCache[id] = { data, ts: now };

  if (data.odds?.quotaRemaining != null) setQuota(data.odds.quotaRemaining);

  // Archive finished games immediately when detected — before rendering
  if (data.match?.isFinished) {
    const tips = getTips(data.match.id);
    if (tips.length) archiveMatch(data.match, tips);
  }

  renderDetail(data);
}

// ─────────────────────── QUOTA HELPER ───────────────────────
function setQuota(rem) {
  const dot = document.getElementById('qdot');
  const val = document.getElementById('qval');
  if (rem == null) { val.textContent = '—'; val.className = 'qval dim'; dot.className = 'qdot'; return; }
  val.textContent = rem >= 1000 ? (rem/1000).toFixed(1)+'k' : rem;
  const c = rem > 100 ? 'ok' : rem > 20 ? 'warn' : 'bad';
  dot.className = 'qdot ' + c; val.className = 'qval ' + c;
}

  const allShots = [
    ...shots.homeShots.map(s=>({...s,isHome:true})),
    ...shots.awayShots.map(s=>({...s,isHome:false}))
  ].sort((a,b)=>a.minute-b.minute||(a.addedTime||0)-(b.addedTime||0));

  const shotsHtml = allShots.length ? `
  <div class="shots-block">
    <div class="shots-hdr"><span>Remates (${allShots.length})</span><span>${(hxg+axg).toFixed(3)} xG</span></div>
    ${allShots.map(s=>`
      <div class="shot-row">
        <span class="sh-min">${s.minute}'${s.addedTime?'+'+s.addedTime:''}</span>
        <span class="sh-goal">${s.isGoal?'⚽':''}</span>
        <span class="sh-player">${s.player||'—'}</span>
        <span class="sh-side ${s.isHome?'h':'a'}">${s.isHome?'C':'F'}</span>
        <span class="sh-xg">${s.xg.toFixed(3)}</span>
      </div>`).join('')}
  </div>` : '';

  document.getElementById('det-scroll').innerHTML =
    analysisHtml + scoreHtml + chartHtml + statsHtml + oddsHtml + goalsHtml + shotsHtml;

  const tipMarkers = getTips(m.id).filter(t => t.minuteEntry > 0);
  if (shots.totalShots > 0) requestAnimationFrame(() => buildChart(shots, inc, m, tipMarkers));
}

// ─────────────────────── TIPS PERSISTENCE ───────────────────────
function getTips(matchId) {
  try { return JSON.parse(localStorage.getItem('_tips_' + matchId) || '[]'); } catch { return []; }
}
function saveTips(matchId, tips) {
  localStorage.setItem('_tips_' + matchId, JSON.stringify(tips));
}
function clearTips(matchId) {
  localStorage.removeItem('_tips_' + matchId);
}

// Called on every renderDetail — detects new tips and updates existing ones
function syncTips(matchId, picks, minute) {
  if (!picks || !picks.length) return getTips(matchId);
  const existing = getTips(matchId);
  let changed = false;

  for (const p of picks) {
    const key = p.market + '|' + p.label;
    const found = existing.find(t => t.key === key);
    if (!found) {
      // First time this tip appears — record it
      existing.push({
        key,
        market: p.market,
        label: p.label,
        oddEntry: p.odds,
        oddNow: p.odds,
        edgeEntry: p.edge ?? null,
        minuteEntry: minute,
        ts: Date.now(),
        result: null,
      });
      changed = true;
    } else {
      // Update current odd
      if (found.result === null && p.odds !== found.oddNow) {
        found.oddNow = p.odds;
        changed = true;
      }
    }
  }

  if (changed) saveTips(matchId, existing);
  return existing;
}

function autoResolveTips(matchId, tips, match, inc) {
  const hg = match.homeGoals || 0, ag = match.awayGoals || 0;
  const totalGoals = hg + ag;
  const isFinished = match.isFinished;
  let changed = false;

  for (const t of tips) {
    if (t.result !== null) continue; // já resolvida (manual ou auto), não tocar

    // ── O/U Totals ──
    const overM  = t.label.match(/^Over\s+([\d.]+)$/i);
    const underM = t.label.match(/^Under\s+([\d.]+)$/i);

    if (overM) {
      const line = parseFloat(overM[1]);
      if (totalGoals > line) { t.result = 'green'; changed = true; }
      // Under pode ser marcada red durante o jogo quando já não é possível ganhar?
      // Não: jogo pode ainda terminar com menos golos; só marcar red no final
      else if (isFinished)   { t.result = 'red';   changed = true; }
    }

    if (underM) {
      const line = parseFloat(underM[1]);
      if (totalGoals > line) { t.result = 'red';   changed = true; } // já perdeu
      else if (isFinished)   { t.result = 'green'; changed = true; }
    }

    // ── HCP — resolve quando o handicap ajustado é claramente ganho/perdido ──
    if (t.market === 'HCP' && t.key) {
      // key format: "HCP|Team Name +X.X"  — extract point from label
      const hcpM = t.label.match(/([-+][\d.]+)\s*$/);
      const hcpPt = hcpM ? parseFloat(hcpM[1]) : null;
      if (hcpPt !== null) {
        // Determine if this is a home or away pick by checking if label contains home team
        const hn = (match.homeTeam || '').toLowerCase().split(' ')[0];
        const isHomePick = t.label.toLowerCase().includes(hn);
        const adjHome = hg + (isHomePick ? hcpPt : 0);
        const adjAway = ag + (isHomePick ? 0 : hcpPt);
        const margin = adjHome - adjAway;
        const remMin = Math.max((match.minute || 90) < 90 ? 90 - (match.minute || 90) : 0, 0);

        // Can settle live if margin > remaining possible goals (conservative: 4 goals/half)
        const maxRemaining = remMin > 45 ? 4 : remMin > 0 ? 2 : 0;
        if (margin > maxRemaining)       { t.result = 'green'; changed = true; }
        else if (-margin > maxRemaining) { t.result = 'red';   changed = true; }
        else if (isFinished) {
          if (margin > 0)      { t.result = 'green'; changed = true; }
          else if (margin < 0) { t.result = 'red';   changed = true; }
          else                 { t.result = 'void';  changed = true; } // push
        }
      }
    }

    // ── 1X2 — só auto-resolve no fim do jogo ──
    if (t.market === '1X2' && isFinished) {
      const result = hg > ag ? 'home' : hg === ag ? 'draw' : 'away';
      // label é nome da equipa (home/away) ou 'Empate'
      let tipOutcome = null;
      if (t.label === 'Empate') {
        tipOutcome = 'draw';
      } else {
        // Comparar label com nome das equipas via shortName
        const hn = (match.homeTeam||'').toLowerCase();
        const an = (match.awayTeam||'').toLowerCase();
        const lbl = t.label.toLowerCase();
        if (hn.includes(lbl) || lbl.includes(hn.split(' ')[0]))      tipOutcome = 'home';
        else if (an.includes(lbl) || lbl.includes(an.split(' ')[0])) tipOutcome = 'away';
      }
      if (tipOutcome) { t.result = tipOutcome === result ? 'green' : 'red'; changed = true; }
    }
  }

  if (changed) saveTips(matchId, tips);
  return tips;
}

function setTipResult(matchId, key, result) {
  const tips = getTips(matchId);
  const t = tips.find(t => t.key === key);
  if (t) { t.result = result === t.result ? null : result; saveTips(matchId, tips); }
}

function fmtTipTs(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ─────────────────────── ANALYSIS / PICKS CARD ───────────────────────
function buildAnalysisCard(m, shots, inc, odds) {
  const minute = m.minute || 0;
  const redCards = (inc.cards || []).filter(c => c.cardType === 'red' || c.cardType === 'yellowRed').length;

  // ── Blocker conditions ──
  const warnings = [];
  if (minute < 30 && minute > 0)
    warnings.push({ icon: '⏱', text: `Apenas ${minute} min jogados — algoritmo requer pelo menos 30 min para picks fiáveis` });
  if (minute === 0)
    warnings.push({ icon: '⏳', text: 'Jogo ainda não iniciado ou sem dados de tempo' });
  if (shots._manual)
    warnings.push({ icon: '✏', text: 'xG inserido manualmente — projeções baseadas nos valores que introduziste' });
  if (redCards > 0)
    warnings.push({ icon: '🟥', text: `${redCards} cartão(ões) vermelho(s) — superioridade numérica invalida o modelo` });
  if (!odds?.available && odds?.reason)
    warnings.push({ icon: '◈', text: odds.reason.includes('No odds mapping')
      ? 'Liga não coberta pela Odds API — sem picks disponíveis'
      : 'Sem odds disponíveis para este jogo' });

  // ── Value picks ──
  const ODDS_MIN = 1.40, ODDS_MAX = 4.00;
  const picks = [];
  const bh = odds?.benter?.h2h;
  const bt = odds?.benter?.totals;
  const bs = odds?.benter?.spreads;
  const outLbls = { home: shortName(m.homeTeam), draw: 'Empate', away: shortName(m.awayTeam) };

  // Helper: accept pick only if odds within range
  const validOdds = (o) => o?.bookieOdds && o.bookieOdds >= ODDS_MIN && o.bookieOdds <= ODDS_MAX;

  // 1X2 — with anti-double rule: if draw + away both value, replace with HCP away
  const h2xPicks = [];
  if (bh?.outcomes) {
    for (const [k, o] of Object.entries(bh.outcomes)) {
      if (o.isValue && validOdds(o)) h2xPicks.push({ key: k, o });
    }
  }
  const hasAwayVal = h2xPicks.some(p => p.key === 'away');
  const hasDrawVal = h2xPicks.some(p => p.key === 'draw');
  const hasHomeVal = h2xPicks.some(p => p.key === 'home');

  if (hasAwayVal && hasDrawVal && !hasHomeVal) {
    // Anti-double rule: consolidate away + draw → suggest HCP instead (handled below via bs)
    // Don't push either — the spreads block will pick up the away HCP if it has value
    picks.push({ _skipReason: 'away+draw→HCP', market: '⚠ 1X2', label: 'Away+Draw value → usar HCP Away', odds: null, edge: 0, blend: 0, model: 0, isWarning: true });
  } else {
    for (const { key: k, o } of h2xPicks) {
      picks.push({ market: '1X2', label: outLbls[k] || k, odds: o.bookieOdds, edge: o.edge, blend: o.blendedProb, model: o.modelProb });
    }
  }

  // Totals
  if (bt?.outcomes) {
    const ouLbl = k => k === 'over' ? `Over ${bt.line||''}` : `Under ${bt.line||''}`;
    for (const [k, o] of Object.entries(bt.outcomes)) {
      if (o.isValue && validOdds(o)) picks.push({
        market: `O/U ${bt.line||''}`, label: ouLbl(k),
        odds: o.bookieOdds, edge: o.edge,
        blend: o.blendedProb, model: o.modelProb,
      });
    }
  }

  // Spreads / Handicap
  if (bs?.outcomes) {
    const hptH = bs.homePoint != null ? (bs.homePoint >= 0 ? '+' : '') + bs.homePoint : '';
    const hptA = bs.awayPoint != null ? (bs.awayPoint >= 0 ? '+' : '') + bs.awayPoint : '';
    const spLbl = { home: `${shortName(m.homeTeam)} ${hptH}`, away: `${shortName(m.awayTeam)} ${hptA}` };
    for (const [k, o] of Object.entries(bs.outcomes)) {
      if (o.isValue && validOdds(o)) picks.push({
        market: `HCP`, label: spLbl[k] || k,
        odds: o.bookieOdds, edge: o.edge,
        blend: o.blendedProb, model: o.modelProb,
      });
    }
  }

  const canHavePicks = warnings.filter(w => w.icon !== '◈').length === 0;

  // ── Sync tip history — only real picks, not warnings ──
  const realPicks = picks.filter(p => !p.isWarning);
  const activePicks = (canHavePicks && realPicks.length) ? realPicks : [];
  const allTips = syncTips(m.id, activePicks, minute);
  autoResolveTips(m.id, allTips, m, inc);
  maybeArchive(m.id, m, allTips); // archive when game finishes

  // ── Render ──
  let html = '<div class="analysis-card">';

  // Header — VALUE only when there are real (non-warning) picks
  const hasValue = realPicks.length > 0 && canHavePicks;
  html += `<div class="ac-hdr">
    <span class="ac-title">${hasValue ? '✦ Análise · VALUE' : '◎ Análise'}</span>
    ${minute > 0 ? `<span class="ac-min">${m.statusDesc || ''}${m.statusDesc && minute ? ' · ' : ''}${fmtMin(m)}</span>` : ''}
  </div>`;

  // Warnings
  if (warnings.length) {
    html += warnings.map(w =>
      `<div class="ac-warn"><span class="ac-wi">${w.icon}</span><span class="ac-wt">${w.text}</span></div>`
    ).join('');
  }

  // Current picks
  if (hasValue) {
    html += picks.map(p => p.isWarning
      ? `<div class="ac-warn"><span class="ac-wi">↗</span><span class="ac-wt">${p.label}</span></div>`
      : `<div class="ac-pick">
        <div class="ac-pick-top">
          <span class="ac-pick-mkt">${p.market}</span>
          <span class="ac-pick-lbl">${p.label}</span>
          <span class="ac-pick-odds">${p.odds ? Number(p.odds).toFixed(2) : '—'}</span>
        </div>
        <div class="ac-pick-sub">
          Blend ${pct(p.blend)}% · Modelo ${pct(p.model)}% · Edge <strong style="color:var(--green)">+${p.edge.toFixed(1)}%</strong>
        </div>
      </div>`).join('');
  } else if (canHavePicks && odds?.available) {
    html += `<div class="ac-nopick">Sem value encontrado neste momento</div>`;
  } else if (!odds?.available && !warnings.some(w => w.icon === '◈')) {
    html += `<div class="ac-nopick">Sem odds disponíveis para picks</div>`;
  }

  html += '</div>';

  // ── Tips history block (rendered separately, outside analysis-card) ──
  if (allTips.length) {
    html += buildTipsHistory(m.id, allTips);
  }

  return html;
}

function toggleTipResult(matchId, key) {
  // Cycle: null → green → red → null
  const tips = getTips(matchId);
  const t = tips.find(t => t.key === key);
  if (!t) return;
  t.result = t.result === null ? 'green' : t.result === 'green' ? 'red' : t.result === 'red' ? 'void' : null;
  saveTips(matchId, tips);
  // Re-render detail without a server call
  const cached = S.trackCache[matchId];
  if (cached) renderDetail(cached.data);
}

function buildTipsHistory(matchId, tips) {
  const rows = tips.map(t => {
    const oddNow = t.oddNow ? Number(t.oddNow).toFixed(2) : '—';
    const oddEntry = t.oddEntry ? Number(t.oddEntry).toFixed(2) : '—';
    const oddDiff = t.oddNow && t.oddEntry ? t.oddNow - t.oddEntry : 0;
    const diffCls = oddDiff > 0.01 ? 'up' : oddDiff < -0.01 ? 'down' : '';
    const diffTxt = oddDiff !== 0
      ? `${oddDiff > 0 ? '▲' : '▼'} ${Math.abs(oddDiff).toFixed(2)}`
      : 'sem alteração';
    const resCls = t.result === 'green' ? 'green' : t.result === 'red' ? 'red' : t.result === 'void' ? 'void' : 'pending';
    const resIcon = t.result === 'green' ? '✓' : t.result === 'red' ? '✗' : t.result === 'void' ? '⊘' : '·';
    const timeStr = fmtTipTs(t.ts);
    const edgeTxt2 = t.edgeEntry != null ? `+${Number(t.edgeEntry).toFixed(1)}%` : '';
    return `<div class="tip-row">
      <span class="tip-min">${t.minuteEntry ? t.minuteEntry+"'" : timeStr}</span>
      <span class="tip-mkt">${t.market}</span>
      <span class="tip-lbl">${t.label}${edgeTxt2 ? `<span class="tip-edge">${edgeTxt2}</span>` : ''}</span>
      <div class="tip-odds">
        <span class="tip-odd-entry">${oddEntry}</span>
        <span class="tip-odd-now ${diffCls}">${diffTxt}</span>
      </div>
      <button class="tip-status ${resCls}" onclick="toggleTipResult('${matchId}','${t.key.replace(/'/g,"\'")}')" title="Marcar resultado">${resIcon}</button>
    </div>`;
  }).join('');

  const green = tips.filter(t=>t.result==='green').length;
  const red   = tips.filter(t=>t.result==='red').length;
  const voidN = tips.filter(t=>t.result==='void').length;
  const pl = tips.filter(t=>t.result!=null).length;
  const summary = pl
    ? `${green}✓ ${red}✗${voidN ? ' '+voidN+'⊘' : ''}`
    : `${tips.length} tip${tips.length>1?'s':''}`;

  return `<div class="tips-block">
    <div class="tips-hdr">
      <span class="tips-hdr-lbl">📋 Tips deste jogo</span>
      <span class="tips-hdr-count">${summary}</span>
    </div>
    ${rows}
  </div>`;
}

// ─────────────────────── ODDS / MODEL / BENTER ───────────────────────
const pct = v => Math.round((v||0)*100);
const fmt2 = v => v!=null ? Number(v).toFixed(2) : '—';
const edgeCls = e => e>0?'pos':e<-0.5?'neg':'neu';
const edgeTxt = e => (e>=0?'+':'')+e.toFixed(1)+'%';

function renderOdds(odds, match) {
  if (!odds) return '';
  const outLbls = { home: shortName(match.homeTeam), draw: 'Empate', away: shortName(match.awayTeam) };

  if (!odds.available) {
    const isNoMap = (odds.reason||'').toLowerCase().includes('no odds mapping');
    return `<div class="odds-block">
      <div class="odds-hdr"><span class="odds-lbl">Odds · The Odds API</span></div>
      <div class="no-odds">${isNoMap
        ? `Liga não mapeada: <strong style="color:var(--text2)">${match.tournament}</strong>`
        : (odds.reason||'Sem odds disponíveis')}</div>
    </div>`;
  }

  const { h2h, totals, modelProbabilities: model, benter } = odds;
  const bh = benter?.h2h, bt = benter?.totals, proj = model?.projectedXg;
  const isVal = (o) => bh?.outcomes?.[o]?.isValue;

  // ── 1X2 raw odds ──
  let oddsHtml = '';
  if (h2h) {
    const raw = h2h.rawOdds||{}, novig = h2h.noVig||{};
    const stale = h2h.staleness!=null ? Math.round(h2h.staleness/60)+'m' : null;
    oddsHtml = `<div class="odds-block">
      <div class="odds-hdr">
        <span class="odds-lbl">1X2 Odds</span>
        <span class="odds-bookie">${h2h.bookmakerTitle||h2h.bookmaker||''}${stale?` <span class="odds-stale">${stale} atrás</span>`:''}</span>
      </div>
      <div class="odds-1x2">
        ${['home','draw','away'].map(o=>`
          <div class="odds-cell${isVal(o)?' value':''}">
            <div class="odds-cell-lbl">${outLbls[o]}</div>
            <div class="odds-cell-val">${raw[o]?Number(raw[o]).toFixed(2):'—'}</div>
            <div class="odds-cell-prob">${novig[o]?pct(novig[o])+'% s/vig':''}</div>
            ${isVal(o)?'<div style="font-size:9px;color:var(--green);margin-top:2px;font-weight:800;letter-spacing:.04em">VALUE ✓</div>':''}
          </div>`).join('')}
      </div>
      ${totals?`<div class="odds-row">
        <span class="odds-row-lbl">O/U ${totals.point}</span>
        <div class="odds-chips">
          <span class="ochip${bt?.outcomes?.over?.isValue?' value':''}">Over ${fmt2(totals.rawOdds?.over)}</span>
          <span class="ochip${bt?.outcomes?.under?.isValue?' value':''}">Under ${fmt2(totals.rawOdds?.under)}</span>
        </div>
      </div>`:''}
      ${odds.spreads?`<div class="odds-row">
        <span class="odds-row-lbl">HCP <span style="font-size:9px;color:var(--text3)">${odds.spreads.bookmakerTitle||odds.spreads.bookmaker||''}</span></span>
        <div class="odds-chips">
          <span class="ochip${benter?.spreads?.outcomes?.home?.isValue?' value':''}">
            ${shortName(match.homeTeam)} ${(odds.spreads.homePoint>=0?'+':'')+odds.spreads.homePoint}
            <strong>${fmt2(odds.spreads.rawOdds?.home)}</strong>
          </span>
          <span class="ochip${benter?.spreads?.outcomes?.away?.isValue?' value':''}">
            ${shortName(match.awayTeam)} ${(odds.spreads.awayPoint>=0?'+':'')+odds.spreads.awayPoint}
            <strong>${fmt2(odds.spreads.rawOdds?.away)}</strong>
          </span>
        </div>
      </div>`:''}
    </div>`;
  }

  // ── Model probabilities ──
  let modelHtml = '';
  if (model) {
    const bars = [
      {lbl:outLbls.home, val:model.homeWin, c:'var(--green)'},
      {lbl:'Empate',     val:model.draw,    c:'var(--text2)'},
      {lbl:outLbls.away, val:model.awayWin, c:'var(--amber)'},
    ];
    const ou25 = model.overUnder?.['2.5'];
    modelHtml = `<div class="model-block">
      <div class="odds-hdr"><span class="odds-lbl">Modelo xG · Probabilidades</span></div>
      ${bars.map(b=>`<div class="model-row">
        <span class="model-lbl">${b.lbl}</span>
        <div class="model-bar"><div class="model-fill" style="width:${pct(b.val)}%;background:${b.c}"></div></div>
        <span class="model-pct" style="color:${b.c}">${pct(b.val)}%</span>
      </div>`).join('')}
      ${ou25?`<div class="model-row" style="margin-top:4px">
        <span class="model-lbl" style="color:var(--text3);font-size:11px">+2.5 gols</span>
        <div class="model-bar"><div class="model-fill" style="width:${pct(ou25.over)}%;background:var(--blue)"></div></div>
        <span class="model-pct" style="color:var(--blue)">${pct(ou25.over)}%</span>
      </div>`:''}
      ${proj?`<div class="proj-grid">
        <div class="proj-cell">
          <div class="proj-lbl">xG Projetado Final${proj.intervalAdjust && proj.intervalAdjust !== 1 ? ` <span style="color:var(--amber)">×${proj.intervalAdjust}</span>` : ''}</div>
          <div class="proj-vals"><span class="proj-h">${proj.homeTotal.toFixed(2)}</span><span class="proj-a">${proj.awayTotal.toFixed(2)}</span></div>
        </div>
        <div class="proj-cell">
          <div class="proj-lbl">xG Restante</div>
          <div class="proj-vals"><span class="proj-h">${proj.homeRemaining.toFixed(2)}</span><span class="proj-a">${proj.awayRemaining.toFixed(2)}</span></div>
        </div>
      </div>`:''}
    </div>`;
  }

  // ── Benter 1X2 ──
  let benterHtml = '';
  function benterBlock(b, title) {
    if (!b?.outcomes) return '';
    const mw = Math.round((b.benterWeights?.model||0)*100);
    const bw = Math.round((b.benterWeights?.bookie||0)*100);
    const hasVal = Object.values(b.outcomes).some(o=>o.isValue);
    const keys = Object.keys(b.outcomes);
    const lbl = k => b.market?.includes('O/U')
      ? (k==='over'?`Over ${b.line||''}`:k==='under'?`Under ${b.line||''}`:k)
      : outLbls[k]||k;
    return `<div class="benter-block">
      <div class="benter-hdr">
        <span class="benter-lbl">${title}${hasVal?' &nbsp;<span style="color:var(--green);font-weight:800">VALUE ✓</span>':''}</span>
        <div class="benter-weights">
          <span class="bw m">Mod ${mw}%</span>
          <span class="bw b">Bk ${bw}%</span>
        </div>
      </div>
      ${keys.map(k=>{const o=b.outcomes[k];return `
      <div class="benter-row">
        <span class="b-out">${lbl(k)}</span>
        <div class="b-info">
          <div class="b-blend">${pct(o.blendedProb)}%</div>
          <div class="b-sub">mod ${pct(o.modelProb)}% · bk ${pct(o.bookieNoVig)}% · ${fmt2(o.bookieOdds)}</div>
        </div>
        <span class="b-edge ${edgeCls(o.edge)}">${edgeTxt(o.edge)}</span>
        ${o.isValue?'<span class="val-badge">VALUE</span>':''}
      </div>`}).join('')}
    </div>`;
  }

  if (bh) benterHtml += benterBlock(bh, 'Benter 1X2');
  if (bt) benterHtml += benterBlock(bt, `Benter O/U ${bt.line||''}`);
  if (benter?.spreads) {
    const bs = benter.spreads;
    const hptH = bs.homePoint != null ? (bs.homePoint >= 0 ? '+' : '') + bs.homePoint : '';
    const hptA = bs.awayPoint != null ? (bs.awayPoint >= 0 ? '+' : '') + bs.awayPoint : '';
    // Label outcomes with team name + handicap line
    const bsLabelled = {
      ...bs,
      outcomes: Object.fromEntries(Object.entries(bs.outcomes || {}).map(([k, o]) => [
        k === 'home'
          ? `${shortName(match.homeTeam)} ${hptH}`
          : `${shortName(match.awayTeam)} ${hptA}`,
        o
      ]))
    };
    benterHtml += benterBlock(bsLabelled, `Benter HCP ${bs.bookmaker||''}`.trim());
  }

  return oddsHtml + modelHtml + benterHtml;
}

// ─────────────────────── xG CHART ───────────────────────
function shortName(n) {
  const parts = n.split(' ');
  return parts.length > 2 ? parts.slice(0,2).join(' ') : n;
}

function cumulativePoints(shots, maxMin) {
  const sorted = [...shots].sort((a,b) => a.minute-b.minute || (a.addedTime||0)-(b.addedTime||0));
  const pts = [{x:0, y:0}];
  let cum = 0;
  for (const s of sorted) {
    cum = parseFloat((cum + s.xg).toFixed(4));
    pts.push({x: s.minute + (s.addedTime||0)*0.1, y: cum});
  }
  pts.push({x: maxMin, y: cum});
  return pts;
}

function xgAtMinute(pts, min) {
  let v = 0;
  for (const p of pts) { if (p.x <= min) v = p.y; else break; }
  return v;
}

function buildChart(shots, inc, match, tipMarkers) {
  if (S.chart) { S.chart.destroy(); S.chart = null; }
  const canvas = document.getElementById('xg-canvas');
  if (!canvas) return;

  const lastShotMin = Math.max(0,
    ...shots.homeShots.map(s=>s.minute),
    ...shots.awayShots.map(s=>s.minute));
  const currentMin = match.minute || 0;

  // Live game: cortar no minuto atual; jogo terminado: mostrar até ao último remate ou 90
  const maxMin = match.isLive && currentMin > 0
    ? Math.max(currentMin, lastShotMin) + 2
    : Math.max(lastShotMin + 3, 90);

  const hPts = cumulativePoints(shots.homeShots, maxMin);
  const aPts = cumulativePoints(shots.awayShots, maxMin);

  const maxY = Math.max(
    hPts[hPts.length-1]?.y || 0,
    aPts[aPts.length-1]?.y || 0, 0.5
  ) * 1.2;

  // Goal markers positioned on the curve
  const hGoalPts = inc.goals.filter(g=>g.isHome).map(g => ({
    x: g.minute+(g.addedTime||0)*0.1,
    y: xgAtMinute(hPts, g.minute+(g.addedTime||0)*0.1)
  }));
  const aGoalPts = inc.goals.filter(g=>!g.isHome).map(g => ({
    x: g.minute+(g.addedTime||0)*0.1,
    y: xgAtMinute(aPts, g.minute+(g.addedTime||0)*0.1)
  }));

  // Halftime line annotation data (as scatter with high y)
  const htLine = match.statusCode === 7 || (match.minute && match.minute > 45)
    ? [{ x:45, y:0 },{ x:45, y:maxY }] : [];

  const GREEN = '#4ade80', AMBER = '#fbbf24';
  const GFILL = 'rgba(74,222,128,0.15)', AFILL = 'rgba(251,191,36,0.15)';
  const GRID = 'rgba(255,255,255,0.055)', TICK = 'rgba(255,255,255,0.28)';

  S.chart = new Chart(canvas, {
    data: {
      datasets: [
        {
          type:'line', label: match.homeTeam,
          data: hPts,
          borderColor: GREEN, backgroundColor: GFILL,
          borderWidth: 2, fill:'origin', stepped:true,
          pointRadius:0, tension:0, order:3,
        },
        {
          type:'line', label: match.awayTeam,
          data: aPts,
          borderColor: AMBER, backgroundColor: AFILL,
          borderWidth: 2, fill:'origin', stepped:true,
          pointRadius:0, tension:0, order:4,
        },
        {
          type:'scatter', label:'Golos Casa',
          data: hGoalPts,
          backgroundColor: GREEN, borderColor:'#0a0c0a', borderWidth:2,
          pointRadius:8, pointHoverRadius:10, order:1,
        },
        {
          type:'scatter', label:'Golos Fora',
          data: aGoalPts,
          backgroundColor: AMBER, borderColor:'#0a0c0a', borderWidth:2,
          pointRadius:8, pointHoverRadius:10, order:2,
        },
        ...(htLine.length ? [{
          type:'line', label:'Intervalo',
          data: htLine,
          borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          borderDash:[4,4], pointRadius:0, fill:false, order:5,
        }] : []),
        ...((tipMarkers||[]).length ? [{
          type:'scatter', label:'Tips',
          data: (tipMarkers||[]).map(t => {
            // Posicionar o marcador na altura da curva home ou a metade do maxY
            const yH = xgAtMinute(hPts, t.minuteEntry);
            const yA = xgAtMinute(aPts, t.minuteEntry);
            return { x: t.minuteEntry, y: Math.max(yH, yA, 0.08), _tip: t };
          }),
          backgroundColor: (tipMarkers||[]).map(t =>
            t.result === 'green' ? 'rgba(74,222,128,0.9)'
            : t.result === 'red' ? 'rgba(248,113,113,0.9)'
            : 'rgba(255,255,255,0.85)'
          ),
          borderColor: '#0a0c0a', borderWidth: 2,
          pointStyle: 'triangle', rotation: 0,
          pointRadius: 10, pointHoverRadius: 12, order: 0,
        }] : []),
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      animation:{ duration:500 },
      interaction:{ mode:'nearest', intersect:false, axis:'x' },
      scales:{
        x:{
          type:'linear', min:0, max:maxMin,
          grid:{ color:GRID }, border:{ color:GRID },
          ticks:{
            color:TICK, maxTicksLimit:8,
            font:{ family:"'JetBrains Mono',monospace", size:10 },
            callback: v => Math.round(v)+"'",
          }
        },
        y:{
          min:0, max:parseFloat(maxY.toFixed(2)),
          grid:{ color:GRID }, border:{ color:GRID },
          ticks:{
            color:TICK, maxTicksLimit:6,
            font:{ family:"'JetBrains Mono',monospace", size:10 },
            callback: v => v.toFixed(1),
          }
        }
      },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#1e241d',
          borderColor:'rgba(255,255,255,0.08)', borderWidth:1,
          titleColor:'rgba(255,255,255,0.4)',
          bodyColor:'#e2e8e0',
          padding:10,
          titleFont:{ family:"'JetBrains Mono',monospace", size:10 },
          bodyFont:{ family:"'JetBrains Mono',monospace", size:11 },
          callbacks:{
            title: items => Math.round(items[0].parsed.x) + "'",
            label: item => {
              if (item.datasetIndex === 0) return ' ' + shortName(match.homeTeam) + ': ' + item.parsed.y.toFixed(3) + ' xG';
              if (item.datasetIndex === 1) return ' ' + shortName(match.awayTeam) + ': ' + item.parsed.y.toFixed(3) + ' xG';
              if (item.datasetIndex === 2) return ' ⚽ Golo Casa';
              if (item.datasetIndex === 3) return ' ⚽ Golo Fora';
              // Tips dataset (index 5 se houver htLine, 4 se não)
              const raw = item.raw;
              if (raw && raw._tip) {
                const t = raw._tip;
                const res = t.result === 'green' ? ' ✓' : t.result === 'red' ? ' ✗' : '';
                return ` 🔔 ${t.market} ${t.label} @ ${Number(t.oddEntry).toFixed(2)}${res}`;
              }
              return '';
            }
          }
        }
      }
    }
  });
}

// ─────────────────────── CLIENT-SIDE MODEL RECALC ───────────────────────
// When xG is manual, server computed model probs with homeXg=0.
// This function rebuilds modelProbabilities + benter values with the correct xG.
function injectManualOdds(odds, match, shots) {
  if (!odds) return odds;
  const hxg = shots.homeXg, axg = shots.awayXg;
  if (hxg === 0 && axg === 0) return odds;

  // Minuto seguro: nunca usar 0 como elapsed (mesma lógica do servidor)
  // Se minute é null (ex: intervalo code=31), usar 45 como fallback conservador
  const rawMin = match.minute;
  const minute = rawMin != null && rawMin > 0 ? rawMin
               : (match.statusCode === 31 ? 45    // Intervalo
               : match.statusCode === 41 ? 105    // Prolongamento 1ªP
               : match.statusCode === 42 ? 120    // Prolongamento 2ªP
               : 45);                             // fallback genérico
  const hGoals = match.homeGoals || 0, aGoals = match.awayGoals || 0;

  // Simple Dixon-Coles Poisson approximation (mirrors server logic)
  function poisson(lambda, k) {
    let p = Math.exp(-lambda);
    for (let i = 1; i <= k; i++) p *= lambda / i;
    return p;
  }
  function matchProbs(mu1, mu2, maxGoals = 6) {
    let home = 0, draw = 0, away = 0;
    for (let i = 0; i <= maxGoals; i++) {
      for (let j = 0; j <= maxGoals; j++) {
        const p = poisson(mu1, i) * poisson(mu2, j);
        if (i > j) home += p; else if (i === j) draw += p; else away += p;
      }
    }
    const tot = home + draw + away;
    return { homeWin: home/tot, draw: draw/tot, awayWin: away/tot };
  }

  // Remaining xG = total xG + any xG already converted to goals (simple proxy)
  const intervalAdj = minute > 75 ? 1.48 : minute > 60 ? 1.21 : minute > 45 ? 1.10 : minute > 30 ? 1.15 : minute > 15 ? 1.10 : 1.0;
  const fullDur = minute > 90 ? 120 : 90;
  const elapsed = Math.min(minute, fullDur);
  const remMin = Math.max(fullDur - elapsed, 1);
  // Taxa por minuto baseada no xG acumulado até agora
  const MAX_XG_RATE = 0.08; // cap: 7.2 xG/90min — prevents explosion on transition glitch
  const homeRate = Math.min(hxg / elapsed, MAX_XG_RATE);
  const awayRate = Math.min(axg / elapsed, MAX_XG_RATE);
  const projH = hGoals + homeRate * remMin * intervalAdj;
  const projA = aGoals + awayRate * remMin * intervalAdj;

  const probs = matchProbs(Math.max(0.05, projH), Math.max(0.05, projA));

  // O/U 2.5 approximation
  const mu = projH + projA;
  let over25 = 0;
  for (let total = 3; total <= 12; total++) {
    for (let i = 0; i <= total; i++) {
      over25 += poisson(projH, i) * poisson(projA, total - i);
    }
  }

  const model = {
    homeWin: probs.homeWin, draw: probs.draw, awayWin: probs.awayWin,
    projectedXg: { home: parseFloat(hxg.toFixed(3)), away: parseFloat(axg.toFixed(3)) },
    overUnder: { "2.5": { over: over25, under: 1 - over25 } },
  };

  const updated = { ...odds, modelProbabilities: model };

  // Recalculate Benter value if we have odds
  if (odds.h2h?.rawOdds && odds.h2h?.noVig) {
    const model1x2 = { home: probs.homeWin, draw: probs.draw, away: probs.awayWin };
    updated.benter = { ...odds.benter };
    updated.benter.h2h = calcBenter(model1x2, odds.h2h.noVig, odds.h2h.rawOdds, minute);
  }

  return updated;
}

function calcBenter(modelProbs, bookieNovig, bookieRaw, minute) {
  // Benter ratio table (mirrors server BENTER_TABLE)
  const table = [[0,10,0.10,0.90],[10,20,0.20,0.80],[20,30,0.30,0.70],[30,40,0.40,0.60],
    [40,50,0.50,0.50],[50,60,0.60,0.40],[60,70,0.70,0.30],[70,80,0.80,0.20],[80,100,0.90,0.10]];
  let mw = 0.10, bw = 0.90;
  for (const [f,t,m_,b_] of table) { if (minute >= f && minute < t) { mw=m_; bw=b_; break; } }

  const outcomes = {};
  for (const key of ["home","draw","away"]) {
    const mp = modelProbs[key] || 0;
    const bp = bookieNovig[key] || 0;
    const bookieOdds = bookieRaw[key];
    const tot = mw + bw;
    const blended = (mp * mw + bp * bw) / tot;
    const impliedOdds = bookieOdds ? 1 / bookieOdds : null;
    const edge = impliedOdds != null ? (blended - impliedOdds) / impliedOdds * 100 : null;
    outcomes[key] = {
      modelProb: mp, bookieProb: bp, blendedProb: blended,
      bookieOdds, edge: edge || 0,
      isValue: edge != null && edge > 5,
    };
  }
  return { outcomes, benterWeights: { model: mw, bookie: bw }, minute };
}

// ─────────────────────── ARCHIVE / SETTLEMENT ───────────────────────
const ARCHIVE_KEY = '_xg_archive';
const ARCHIVE_MAX = 200; // max games to keep

function getArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]'); } catch { return []; }
}
function saveArchive(arr) {
  // Keep most recent ARCHIVE_MAX entries
  if (arr.length > ARCHIVE_MAX) arr = arr.slice(arr.length - ARCHIVE_MAX);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(arr));
}

// Called when a tracked match is detected as finished
function archiveMatch(match, tips) {
  if (!tips || !tips.length) return;
  const archive = getArchive();
  // Don't double-archive
  if (archive.find(g => g.matchId === match.id)) return;

  const entry = {
    matchId: match.id,
    homeTeam: match.homeTeam,
    awayTeam: match.awayTeam,
    homeGoals: match.homeGoals,
    awayGoals: match.awayGoals,
    tournament: match.tournament,
    country: match.country,
    archivedAt: Date.now(),
    tips: tips.map(t => ({ ...t })), // snapshot
  };
  archive.push(entry);
  saveArchive(archive);
  log_d('Archived', match.homeTeam, 'vs', match.awayTeam, '—', tips.length, 'tips');
}

function log_d(...args) { /* console.log('[archive]', ...args); */ }

// Hook into autoResolveTips — when game finishes, archive it
function maybeArchive(matchId, match, tips) {
  if (match.isFinished && tips.length > 0) {
    archiveMatch(match, tips);
  }
}

// ── Settlement filter state ──
let S_filter = 'all';
function setSettFilter(f, btn) {
  S_filter = f;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderSettlement();
}

function gamePL(tips) {
  // Simple P&L: +1 unit per green (profit = bookie odds - 1), -1 unit per red
  let pl = 0, settled = 0;
  for (const t of tips) {
    if (t.result === 'green') { pl += (t.oddEntry || 2) - 1; settled++; }
    else if (t.result === 'red') { pl -= 1; settled++; }
    // void: no change
  }
  return { pl, settled };
}

function confirmClearArchive() {
  if (confirm('Apagar todo o histórico de settlement?')) {
    localStorage.setItem(ARCHIVE_KEY, '[]');
    renderSettlement();
  }
}

// Normalise a server-side tips row to the same shape used everywhere
function _normServerTip(t) {
  return {
    key:         t.tip_key,
    market:      t.market,
    label:       t.label,
    oddEntry:    t.odd_entry,
    oddNow:      t.odd_now,
    edgeEntry:   t.edge_entry ?? null,
    minuteEntry: t.minute_entry,
    ts:          (t.wall_ts || 0) * 1000,
    result:      t.result,
  };
}

async function renderSettlement() {
  const summaryEl = document.getElementById('sett-summary');
  const listEl    = document.getElementById('sett-list');
  if (!summaryEl || !listEl) return;

  listEl.innerHTML = '<div class="loading-row"><div class="spinner"></div>A carregar histórico…</div>';

  // Fetch from server — source of truth for resolved tips
  const { ok, data } = await api('/api/state/tips?limit=200');

  // Fall back to localStorage if server unreachable
  let games = [];
  if (ok && data?.games) {
    // Only games that have at least one tip
    games = data.games
      .filter(g => g.tips && g.tips.length > 0)
      .map(g => ({
        matchId:   g.id,
        homeTeam:  g.home_team,
        awayTeam:  g.away_team,
        homeGoals: g.home_goals,
        awayGoals: g.away_goals,
        tournament: g.tournament || '',
        country:   g.country || '',
        archivedAt: (g.archived_at || g.start_ts || 0) * 1000,
        tips:      g.tips.map(_normServerTip),
      }))
      .sort((a, b) => (b.archivedAt || 0) - (a.archivedAt || 0));
  } else {
    // Offline fallback: localStorage archive
    games = [...getArchive()].reverse();
  }

  // ── Global summary ──
  let totalGreen = 0, totalRed = 0, totalVoid = 0, totalPl = 0;
  for (const g of games) {
    const {pl} = gamePL(g.tips);
    totalPl += pl;
    for (const t of g.tips) {
      if (t.result === 'green') totalGreen++;
      else if (t.result === 'red') totalRed++;
      else if (t.result === 'void') totalVoid++;
    }
  }
  const plSign = totalPl >= 0 ? '+' : '';
  summaryEl.innerHTML = `
    <div class="sett-sum-cell">
      <div class="sett-sum-val green">${totalGreen}</div>
      <div class="sett-sum-lbl">✓ Ganhas</div>
    </div>
    <div class="sett-sum-cell">
      <div class="sett-sum-val red">${totalRed}</div>
      <div class="sett-sum-lbl">✗ Perdidas</div>
    </div>
    <div class="sett-sum-cell">
      <div class="sett-sum-val ${totalPl >= 0 ? 'green' : 'red'}">${plSign}${totalPl.toFixed(2)}u</div>
      <div class="sett-sum-lbl">P&L Total</div>
    </div>`;

  if (!games.length) {
    listEl.innerHTML = '<div class="sett-empty">Nenhum jogo com tips ainda.<br>As tips são registadas automaticamente nos jogos monitorados.</div>';
    return;
  }

  // ── Filter ──
  let filtered = games;
  if (S_filter === 'profit')  filtered = games.filter(g => gamePL(g.tips).pl > 0);
  if (S_filter === 'loss')    filtered = games.filter(g => gamePL(g.tips).pl < 0);
  if (S_filter === 'pending') filtered = games.filter(g => g.tips.some(t => t.result === null));

  if (!filtered.length) {
    listEl.innerHTML = '<div class="sett-empty">Nenhum jogo nesta categoria.</div>';
    return;
  }

  listEl.innerHTML = filtered.map(g => {
    const {pl} = gamePL(g.tips);
    const plTxt = pl !== 0 ? (pl > 0 ? '+' : '') + pl.toFixed(2) + 'u' : '—';
    const plCls = pl > 0.001 ? 'green' : pl < -0.001 ? 'red' : 'neutral';
    const flag  = countryFlag(g.country);
    const dateStr = g.archivedAt
      ? new Date(g.archivedAt).toLocaleDateString('pt-PT', {day:'2-digit',month:'2-digit'})
      : '—';
    const pending = g.tips.filter(t=>t.result===null).length;
    const hasPending = pending > 0;

    const tipsHtml = g.tips.map(t => {
      const resCls  = t.result === 'green' ? 'green' : t.result === 'red' ? 'red' : t.result === 'void' ? 'void' : 'pending';
      const resIcon = t.result === 'green' ? '✓' : t.result === 'red' ? '✗' : t.result === 'void' ? '⊘' : '·';
      const safeKey = (t.key || t.tip_key || '').replace(/'/g, "\\'");
      return `<div class="sett-tip-row">
        <span class="sett-tip-min">${t.minuteEntry ? t.minuteEntry+"'" : '—'}</span>
        <span class="sett-tip-mkt">${t.market}</span>
        <span class="sett-tip-lbl">${t.label}${t.edgeEntry != null ? `<span class="tip-edge">+${Number(t.edgeEntry).toFixed(1)}%</span>` : ''}</span>
        <span class="sett-tip-odd">@${t.oddEntry ? Number(t.oddEntry).toFixed(2) : '—'}</span>
        <button class="sett-tip-res ${resCls}" onclick="toggleArchiveTip(${g.matchId},'${safeKey}',this)">${resIcon}</button>
      </div>`;
    }).join('');

    return `<div class="sett-game">
      <div class="sett-game-hdr" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <div style="flex:1;min-width:0">
          <div class="sett-game-teams">${flag ? flag+' ' : ''}${g.homeTeam} ${g.homeGoals}–${g.awayGoals} ${g.awayTeam}</div>
          <div class="sett-game-date">${g.tournament} · ${dateStr}${hasPending ? ' · <span style="color:var(--amber)">'+pending+' pendente'+(pending>1?'s':'')+'</span>' : ''}</div>
        </div>
        <span class="sett-game-pl ${plCls}">${plTxt}</span>
      </div>
      <div>${tipsHtml}</div>
    </div>`;
  }).join('');
}

async function toggleArchiveTip(matchId, key, btn) {
  // Cycle result via server PATCH, then re-render
  const resCycle = { null: 'green', green: 'red', red: 'void', void: null };
  const curCls   = [...btn.classList].find(c => ['green','red','void','pending'].includes(c)) || 'pending';
  const curRes   = curCls === 'pending' ? null : curCls;
  const newRes   = resCycle[String(curRes)] ?? null;

  const r = await fetch(BASE() + `/api/state/tips/${matchId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tip_key: key, result: newRes }),
  });
  if (r.ok) renderSettlement();
}

    const el = document.getElementById('tab-' + t);

    el.classList.toggle('active', t === tab);

  document.getElementById('view-list').classList.toggle('hidden', tab !== 'live');

  document.getElementById('subhdr').classList.toggle('hidden', tab === 'sett');

  if (tab === 'today') loadToday();
  if (tab === 'sett')  renderSettlement();
}
