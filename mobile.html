  }
  const matches = data.matches || [];
  if (!matches.length) {
    el.innerHTML = '<div class="mempty">Sem jogos agendados hoje nas ligas monitorizadas.</div>';
    return;
  }
  el.innerHTML = renderGrouped(matches, false);
  el.querySelectorAll('.mrow[data-id]').forEach(r =>
    r.addEventListener('click', () => openMatch(parseInt(r.dataset.id)))
  );
}

// ─────────────────────── SETUP / CONFIG ───────────────────────
function renderSetupPrompt() {
  return `<div style="margin:24px 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden">
    <div style="padding:16px 16px 0;background:var(--bg3);border-bottom:1px solid var(--border)">
      <div style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:4px">⬡ Configuração inicial</div>
      <div style="font-size:12px;color:var(--text3);padding-bottom:14px;line-height:1.5">
        Introduz o URL do teu servidor Railway para começar.
      </div>
    </div>
    <div style="padding:16px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px">URL do servidor Railway</div>
      <input id="setup-url" class="form-in" placeholder="xxx.up.railway.app" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
        style="width:100%;margin-bottom:10px" value="${localStorage.getItem('_sf_host')||''}">
      <div style="font-size:11px;color:var(--text3);margin-bottom:14px;line-height:1.5">
        Encontra o URL em Railway → Settings → Networking → Domains
      </div>
      <button onclick="saveSetup()" style="width:100%;padding:12px;border-radius:10px;background:var(--green-bg);border:1px solid rgba(74,222,128,.25);color:var(--green);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer">
        Ligar ao servidor
      </button>
    </div>
  </div>`;
}

function openSetup() {
  const el = document.getElementById('mlist');
  el.innerHTML = renderSetupPrompt();
  setTimeout(() => document.getElementById('setup-url')?.focus(), 100);
}

function saveSetup() {
  const url = (document.getElementById('setup-url')?.value || '').trim().replace(/\/+$/, '');
  if (!url) return;
  localStorage.setItem('_sf_host', url);
  // Immediately clear the form and show connecting state
  const el = document.getElementById('mlist');
  if (el) el.innerHTML = '<div class="loading-row"><div class="spinner"></div>A ligar a ' + url + '…</div>';
  loadMatches();
}

// ─────────────────────── VIEWS ───────────────────────
function showView(v) {
  document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
  document.getElementById('view-today').classList.toggle('hidden', v !== 'today');
  document.getElementById('view-detail').classList.toggle('hidden', v !== 'detail');
  document.getElementById('view-sett').classList.toggle('hidden', v !== 'sett');
  document.getElementById('subhdr').classList.toggle('hidden', !['list','today'].includes(v));
  if (v === 'list' || v === 'today') {
    S.selectedId = null;
    if (S.detTimer) { clearInterval(S.detTimer); S.detTimer = null; }
    if (S.chart) { S.chart.destroy(); S.chart = null; }
  }
}

// ─────────────────────── SETTINGS (auto-refresh only) ───────────────────────
function syncArBtns() {}  // no-op, kept for compat

// ─────────────────────── EVENTS ───────────────────────
document.getElementById('btn-refresh').addEventListener('click', loadMatches);
document.getElementById('btn-back').addEventListener('click', () => { showView(S.prevTab || 'list'); switchMainTab(S.prevTab || 'live'); });
document.getElementById('btn-det-refresh').addEventListener('click', () => {
  if (S.selectedId) fetchDetail(S.selectedId, true);
});

// xG Manual modal events
document.getElementById('modal-xg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-xg')) closeXgModal();
});
document.getElementById('btn-xg-save').addEventListener('click', () => {
  if (!_xgModalId) return;
  const hxg = parseFloat(document.getElementById('xg-home').value);
  const axg = parseFloat(document.getElementById('xg-away').value);
  if (isNaN(hxg) || isNaN(axg) || hxg < 0 || axg < 0) {
    document.getElementById('xg-home').style.borderBottomColor = 'var(--red)';
    document.getElementById('xg-away').style.borderBottomColor = 'var(--red)';
    return;
  }
  const sh = parseInt(document.getElementById('xg-shots-home').value) || 0;
  const sa = parseInt(document.getElementById('xg-shots-away').value) || 0;
  const savedId = _xgModalId;
  setManualXg(savedId, { homeXg: hxg, awayXg: axg, shotsHome: sh, shotsAway: sa, ts: Date.now() });
  // Update xgCache immediately so bar refreshes without waiting for fetchDetail
  S.xgCache[savedId] = { homeXg: hxg, awayXg: axg };
  updateCardBar(savedId, hxg, axg);
  // Invalidate detail cache so next render uses manual data
  delete S.trackCache[savedId];
  closeXgModal();
  renderList(); // refresh badge on card
  if (S.selectedId) fetchDetail(S.selectedId, true);
});
document.getElementById('btn-xg-clear').addEventListener('click', () => {
  if (!_xgModalId) return;
  const savedId = _xgModalId;
  clearManualXg(savedId);
  delete S.xgCache[savedId];
  delete S.trackCache[savedId];
  closeXgModal();
  renderList();
  if (S.selectedId) fetchDetail(S.selectedId, true);
});

// ─────────────────────── AUTO-REFRESH ───────────────────────
function startAuto() {
  if (S.autoTimer) { clearInterval(S.autoTimer); S.autoTimer = null; }
  const ms = autoMs();
  if (ms === 0) return;   // Off
  S.autoTimer = setInterval(() => {
    if (!S.selectedId) {
      loadMatches();
    } else {
      // auto-refresh detail only if cache expired
      fetchDetail(S.selectedId);
    }
  }, ms);
}

// ─────────────────────── INIT ───────────────────────
showView('list');
switchMainTab('live');
loadLogos().finally(() => { loadMatches(); startAuto(); });
</script>
</body>
</html>
